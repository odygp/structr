<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, -apple-system, sans-serif; font-size: 13px; color: #1a1a1a; padding: 16px; background: #fff; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 11px; margin-bottom: 16px; }
    .tabs { display: flex; gap: 0; border-bottom: 1px solid #e5e5e5; margin-bottom: 16px; }
    .tab { padding: 8px 16px; font-size: 12px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
    .tab:hover { color: #1a1a1a; }
    textarea { width: 100%; height: 200px; padding: 12px; border: 1px solid #d4d4d4; border-radius: 8px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; resize: vertical; outline: none; transition: border-color 0.15s; }
    textarea:focus { border-color: #1a1a1a; }
    textarea::placeholder { color: #a3a3a3; }
    .file-drop { width: 100%; height: 120px; border: 2px dashed #d4d4d4; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.15s; color: #888; }
    .file-drop:hover, .file-drop.dragover { border-color: #1a1a1a; background: #fafafa; color: #1a1a1a; }
    .file-drop input { display: none; }
    .file-drop svg { width: 24px; height: 24px; opacity: 0.4; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 12px; transition: all 0.15s; }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { background: #d4d4d4; color: #888; cursor: not-allowed; }
    .status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 12px; display: none; }
    .status.success { display: block; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .status.loading { display: block; background: #fafafa; color: #666; border: 1px solid #e5e5e5; }
    .info { margin-top: 12px; padding: 10px; background: #fafafa; border-radius: 8px; font-size: 11px; color: #666; line-height: 1.5; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h2>Structr Import</h2>
  <p class="subtitle">Import your wireframe into Figma</p>

  <div class="tabs">
    <div class="tab active" data-tab="paste">Paste JSON</div>
    <div class="tab" data-tab="file">Upload File</div>
  </div>

  <!-- Paste tab -->
  <div id="tab-paste">
    <textarea id="json-input" placeholder='Paste your Structr JSON export here...'></textarea>
  </div>

  <!-- File tab -->
  <div id="tab-file" class="hidden">
    <div class="file-drop" id="file-drop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Drop .json file here or click to browse</span>
      <input type="file" id="file-input" accept=".json" />
    </div>
  </div>

  <button class="btn btn-primary" id="import-btn" disabled>Import to Figma</button>

  <div class="status" id="status"></div>

  <div class="info">
    <strong>How to get JSON:</strong> In Structr, click Export > Export JSON to download your wireframe data.
  </div>

  <script>
    let jsonData = null;

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabId = tab.dataset.tab;
        document.getElementById('tab-paste').classList.toggle('hidden', tabId !== 'paste');
        document.getElementById('tab-file').classList.toggle('hidden', tabId !== 'file');
      });
    });

    // Paste input
    const jsonInput = document.getElementById('json-input');
    const importBtn = document.getElementById('import-btn');
    const statusEl = document.getElementById('status');

    jsonInput.addEventListener('input', () => {
      try {
        jsonData = JSON.parse(jsonInput.value);
        importBtn.disabled = false;
        setStatus('', '');
      } catch {
        jsonData = null;
        importBtn.disabled = jsonInput.value.trim().length === 0;
        if (jsonInput.value.trim().length > 0) {
          setStatus('Invalid JSON format', 'error');
        }
      }
    });

    // File drop/upload
    const fileDrop = document.getElementById('file-drop');
    const fileInput = document.getElementById('file-input');

    fileDrop.addEventListener('click', () => fileInput.click());
    fileDrop.addEventListener('dragover', (e) => { e.preventDefault(); fileDrop.classList.add('dragover'); });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
    fileDrop.addEventListener('drop', (e) => {
      e.preventDefault();
      fileDrop.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) readFile(file);
    });
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) readFile(file);
    });

    function readFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          jsonData = JSON.parse(e.target.result);
          importBtn.disabled = false;
          setStatus(`Loaded: ${file.name} (${jsonData.pages?.length || 0} pages)`, 'success');
        } catch {
          setStatus('Invalid JSON file', 'error');
        }
      };
      reader.readAsText(file);
    }

    // Import button
    importBtn.addEventListener('click', () => {
      if (!jsonData) return;
      setStatus('Importing wireframe...', 'loading');
      importBtn.disabled = true;
      parent.postMessage({ pluginMessage: { type: 'import', data: jsonData } }, '*');
    });

    // Status
    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    // Messages from plugin code
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'done') {
        setStatus(`Imported ${msg.sectionCount} sections across ${msg.pageCount} pages`, 'success');
        importBtn.disabled = false;
      } else if (msg.type === 'error') {
        setStatus('Error: ' + msg.message, 'error');
        importBtn.disabled = false;
      } else if (msg.type === 'progress') {
        setStatus(msg.message, 'loading');
      }
    };
  </script>
</body>
</html>
